<body>
  <div class="card">
    <h1>Mini Tâches PWA</h1>
    <p>Exemple Apps Script + GitHub Pages + installation Android</p>

    <button id="loadBtn">Charger les tâches</button>
    <button id="installBtn">Installer l'application</button>

    <div id="status"></div>
    <ul id="tasks"></ul>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbx7avDA94pLJOkq4S4oo_MlfPMnR87AbSISEizgh6F8M3Ify8cIaMA7nWvkzm8MYTLDdw/exec?action=tasks';

  const statusEl = document.getElementById('status');
  const tasksEl = document.getElementById('tasks');
  const installBtn = document.getElementById('installBtn');

  document.getElementById('loadBtn').addEventListener('click', loadTasks);

  function loadTasks() {
    statusEl.textContent = 'Chargement...';
    tasksEl.innerHTML = '';

    const callbackName = 'handleTasks_' + Date.now();

    const script = document.createElement('script');

    window[callbackName] = function(data) {
      try {
        if (!data.success) {
          throw new Error(data.error || 'Erreur inconnue');
        }

        data.tasks.forEach(task => {
          const li = document.createElement('li');
          li.textContent = task.text;
          if (task.done) li.className = 'done';
          tasksEl.appendChild(li);
        });

        statusEl.textContent = 'Tâches chargées';
      } catch (error) {
        statusEl.textContent = 'Erreur : ' + error.message;
      } finally {
        delete window[callbackName];
        script.remove();
      }
    };

    script.src = API_BASE + '?action=tasks&callback=' + callbackName;

    script.onerror = function() {
      statusEl.textContent = 'Erreur de chargement de l’API';
      delete window[callbackName];
      script.remove();
    };

    document.body.appendChild(script);
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        await navigator.serviceWorker.register('./sw.js');
        console.log('Service worker enregistré');
      } catch (error) {
        console.error('Erreur service worker', error);
      }
    });
  }

  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (event) => {
    event.preventDefault();
    deferredPrompt = event;
    installBtn.style.display = 'block';
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
</script>

</body>
</html>
